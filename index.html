<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>キムチ製造電卓</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <!-- 左ペイン: ①製品選択 -->
    <aside class="left">
      <div class="lhead">
        <h1>キムチ製造電卓</h1>
        <button class="btn-link" id="openMasterBtn" style="margin-left:auto;">⚙ 管理</button>
        <button class="btn-link" id="openRecordsBtn">記録一覧 ▸</button>
      </div>
      <div class="scroll">
        <div class="section-title">今日の白菜の量（予定）</div>
        <div class="material-plan" id="materialPlan">
          <div class="barrel-row" data-plan-field="largeCount">
            <div><b>大樽</b><small>210kg / 樽</small></div>
            <button type="button" data-step="-1">−</button><span id="largeCount">0</span><button type="button" data-step="1">＋</button>
          </div>
          <div class="barrel-row" data-plan-field="smallCount">
            <div><b>小樽</b><small>90kg / 樽</small></div>
            <button type="button" data-step="-1">−</button><span id="smallCount">0</span><button type="button" data-step="1">＋</button>
          </div>
          <div class="barrel-row" data-plan-field="hundredCount">
            <div><b>100樽</b><small>35kg / 樽</small></div>
            <button type="button" data-step="-1">−</button><span id="hundredCount">0</span><button type="button" data-step="1">＋</button>
          </div>
          <label class="previous-row"><span>昨日の残り</span><input type="number" id="previousKg" min="0" step="0.1" inputmode="decimal"><b>kg</b></label>
          <div class="plan-total"><span>予定合計</span><strong id="plannedKg">0 kg</strong></div>
          <button type="button" class="btn-plan-save" id="savePlanBtn">白菜予定を保存</button>
        </div>
        <div class="section-title">製品をえらぶ</div>
        <div class="grid-main" id="gridMain"></div>
        <div class="yamada-label"><span>ヤマダ</span><div class="line"></div></div>
        <div class="grid-yamada" id="gridYamada"></div>
        <div class="remaining-card">
          <div><span>本日の予定</span><b id="remainingPlanned">0 kg</b></div>
          <div><span>使用済み</span><b id="usedKg">0 kg</b></div>
          <div class="remaining-main"><span>本日の残り</span><strong id="remainingKg">0 kg</strong></div>
        </div>
      </div>
    </aside>

    <!-- 右ペイン: ②キロ数入力 / ③計算結果 / ④記録 -->
    <main class="right">
      <div class="rhead">
        <span class="name" id="selName">製品を選択してください</span>
        <span class="tare-chip" id="selTare" style="display:none;"></span>
        <span class="clock" id="clock"></span>
      </div>

      <div class="body" id="rightBody">
        <div class="empty-right">左の製品ボタンをタップすると、ここに入力テンキーと計算結果が出ます。</div>
      </div>

      <div class="rfoot">
        <button class="btn-ghost" id="cancelEditBtn" style="display:none;">キャンセル</button>
        <button class="btn-primary" id="recBtn" disabled>この内容で記録する</button>
      </div>
    </main>
  </div>

  <!-- ⑤記録一覧 / 編集ドロワー -->
  <div class="drawer-mask" id="drawerMask"></div>
  <aside class="drawer" id="drawer">
    <div class="dhead">
      <h2>記録一覧</h2>
      <span class="rc-sub" id="drawerDate"></span>
      <button class="btn-ghost" id="closeRecordsBtn">閉じる</button>
    </div>
    <div class="dbody" id="drawerBody">
      <div class="dstate">読み込み中…</div>
    </div>
  </aside>

  <!-- マスター管理（製品の追加・削除）ドロワー -->
  <div class="drawer-mask" id="masterMask"></div>
  <aside class="drawer" id="masterDrawer">
    <div class="dhead">
      <h2>マスター管理</h2>
      <button class="btn-ghost" id="closeMasterBtn">閉じる</button>
    </div>
    <div class="dbody">
      <div class="section-title">製品を追加</div>
      <div class="mform">
        <label class="f-label">製品名</label>
        <input type="text" id="np-name" class="f-input" placeholder="例: 中辛 特注" autocomplete="off">

        <label class="f-label">商品内容量（g）</label>
        <input type="number" id="np-content-g" class="f-input" min="1" step="1" inputmode="numeric" placeholder="例: 400">

        <label class="f-label">区分</label>
        <div class="seg" data-field="group">
          <button type="button" data-v="main" class="active">メイン</button>
          <button type="button" data-v="yamada">ヤマダ</button>
        </div>

        <label class="f-label">基準材料（標準倍率が決まります）</label>
        <div class="seg" data-field="base">
          <button type="button" data-v="hakusai" class="active">白菜</button>
          <button type="button" data-v="daikon">大根</button>
          <button type="button" data-v="changja">チャンジャ</button>
        </div>

        <label class="f-label">タレ種類</label>
        <div class="seg" data-field="tareType">
          <button type="button" data-v="A" class="active">Aタレ</button>
          <button type="button" data-v="B">Bタレ</button>
          <button type="button" data-v="C">Cタレ</button>
        </div>

        <label class="f-label">時間帯</label>
        <div class="seg" data-field="timeSlot">
          <button type="button" data-v="" class="active">なし</button>
          <button type="button" data-v="午前">午前</button>
          <button type="button" data-v="午後">午後</button>
        </div>

        <label class="f-label">追加材料</label>
        <div class="chips" id="np-extras"></div>

        <div class="f-label" style="margin-top:14px;">この設定でのレシピ（プレビュー）</div>
        <div class="result-list" id="np-preview"></div>

        <button class="btn-primary" id="addProductBtn" style="margin-top:14px;">この内容で製品を追加</button>
      </div>

      <div class="section-title" style="margin-top:26px;">登録済みの製品</div>
      <div id="masterList"><div class="dstate">読み込み中…</div></div>
    </div>
  </aside>

  <!-- 配合の正本（係数はここだけ。フロント・GAS 共用） -->
  <script src="recipes.js"></script>
  <script src="app.js"></script>
</body>
</html>
